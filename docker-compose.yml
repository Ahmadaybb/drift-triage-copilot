networks:
  triage_net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  mlflow_data:

services:

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - triage_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    networks:
      - triage_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.12.1
    command: >
      mlflow server
      --backend-store-uri sqlite:///mlflow/mlflow.db
      --default-artifact-root file:///mlflow/artifacts
      --host 0.0.0.0
      --port 5000
    volumes:
      - ./backend/mlflow_registry:/mlflow
    ports:
      - "5001:5000"
    networks:
      - triage_net

  model_service:
    build:
      context: ./backend
      dockerfile: model_service/Dockerfile
    ports:
      - "8000:8000"
    environment:
      AGENT_SERVICE_URL: ${AGENT_SERVICE_URL}
      MLFLOW_TRACKING_URI: http://mlflow:5000
    volumes:
      - ./backend/mlflow_registry:/app/mlflow_registry
      - ./backend/artifacts:/app/artifacts
    networks:
      - triage_net
    depends_on:
      - mlflow
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  agent_service:
    build:
      context: ./backend
      dockerfile: agent_service/Dockerfile
    ports:
      - "8001:8001"
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      MODEL_SERVICE_URL: ${MODEL_SERVICE_URL}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MLFLOW_TRACKING_URI: http://mlflow:5000
    networks:
      - triage_net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      model_service:
        condition: service_healthy

  worker:
    build:
      context: ./backend
      dockerfile: worker/Dockerfile
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      MODEL_SERVICE_URL: ${MODEL_SERVICE_URL}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MLFLOW_TRACKING_URI: http://mlflow:5000
    volumes:
      - ./backend/mlflow_registry:/app/mlflow_registry
      - ./backend/artifacts:/app/artifacts
      - ./backend/data:/app/data
    networks:
      - triage_net
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  dashboard:
    build:
      context: ./frontend
      dockerfile: dashboard/Dockerfile
    ports:
      - "8501:8501"
    environment:
      MODEL_SERVICE_URL: ${MODEL_SERVICE_URL}
      AGENT_SERVICE_URL: ${AGENT_SERVICE_URL}
      MLFLOW_URL: http://mlflow:5000
      REDIS_HOST: redis
      REDIS_PORT: 6379
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      DASHBOARD_REFRESH_SECONDS: "6"
    networks:
      - triage_net
    depends_on:
      model_service:
        condition: service_healthy